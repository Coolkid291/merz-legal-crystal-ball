<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Merz Legal Crystal Ball · Compliance Intelligence</title>
<style>
  :root{
    --navy:#1F3864;
    --navy-2:#2b4a80;
    --navy-ink:#152747;
    --ink:#1b2330;
    --muted:#5b6470;
    --faint:#8a93a1;
    --line:#e5e9f0;
    --line-2:#eef1f6;
    --bg:#f6f8fb;
    --card:#ffffff;
    --chip:#eef2f8;
    --mark:#ffe082;
    --gold:#b8952f;
    --gold-bg:#fffdf5;
    --gold-line:#e4d29a;
    --shadow:0 1px 3px rgba(21,39,71,.06), 0 6px 24px rgba(21,39,71,.05);
    --shadow-lg:0 12px 40px rgba(21,39,71,.16);
    --radius:12px;
    --ease-out:cubic-bezier(.2,.7,.2,1);
    --dur-fast:.18s;
    --dur:.5s;
    --dur-slow:.7s;
    --fs:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  /* ---------- Terminal (dark) theme ---------- */
  body.terminal{
    --ink:#e7ecf8; --muted:#95a3bd; --faint:#6a7791;
    --line:#26324f; --line-2:#1b2540; --bg:#0a0f1e; --card:#101a30;
    --chip:#1a2540; --navy:#6d8fd6; --navy-ink:#d3ddf3;
    --gold-bg:#1d1a10; --gold-line:#584b28;
    --shadow:0 1px 2px rgba(0,0,0,.45), 0 10px 30px rgba(0,0,0,.4);
    --shadow-lg:0 18px 54px rgba(0,0,0,.6);
  }
  body.terminal #q{background:#0d1730}
  body.terminal #q::placeholder{color:#5f6d89}
  body.terminal #dropdown,body.terminal .dd-head{background:#0f1930}
  body.terminal .dd-item:hover,body.terminal .dd-item.active{background:#172440}
  body.terminal .dd-ico.company,body.terminal .rel a.rel-co{background:#1c2b4d;color:var(--navy)}
  body.terminal .fcard .fico{background:linear-gradient(135deg,#1a2744,#121d34)}
  body.terminal .profile-head{background:linear-gradient(135deg,#111b32 0%,#0c1526 100%)}
  body.terminal .row:hover{background:#141f39}
  body.terminal .qcard,body.terminal .bchip,body.terminal .btn-back,body.terminal .btn-act,
  body.terminal .seg,body.terminal .ctrl select,body.terminal .q-filter input,body.terminal .qtag{background:var(--card)}
  body.terminal .qtag.vt{background:#1c2b4d}
  body.terminal mark{background:#5a4a1e;color:#ffe08a}

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--fs);color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased;
    transition:background .3s ease,color .3s ease}
  a{color:var(--navy)}
  button{font-family:inherit}

  /* ---------- Header ---------- */
  header{
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-ink) 100%);
    color:#fff;position:sticky;top:0;z-index:40;
    box-shadow:0 1px 0 rgba(255,255,255,.04), 0 6px 20px rgba(21,39,71,.18);
    transition:padding .25s ease;
  }
  header::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .35s;
    background:
      radial-gradient(58% 70% at 50% -8%, rgba(96,136,214,.42), transparent 62%),
      radial-gradient(42% 55% at 88% -6%, rgba(70,100,175,.30), transparent 70%),
      radial-gradient(40% 55% at 8% 0%, rgba(60,90,160,.22), transparent 72%);}
  header::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .35s;
    background-image:radial-gradient(rgba(255,255,255,.06) 1px, transparent 1.4px);background-size:24px 24px;
    -webkit-mask-image:linear-gradient(180deg,#000,transparent 85%);mask-image:linear-gradient(180deg,#000,transparent 85%);}
  body.route-landing header::before,body.route-landing header::after{opacity:1}
  header > .hwrap,header > .topnav{position:relative;z-index:1}
  .hwrap{max-width:1000px;margin:0 auto;padding:0 22px}
  .brand{display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none;padding-top:14px}
  .brand .logo{
    width:30px;height:30px;border-radius:8px;flex:none;
    background:radial-gradient(120% 120% at 30% 20%, #4d6db3 0%, #24406f 70%);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);
    display:grid;place-items:center;font-weight:800;font-size:14px;color:#dbe6ff;letter-spacing:.5px;
  }
  .brand .name{font-size:15.5px;font-weight:680;letter-spacing:.2px}
  .brand .sub{font-size:11px;color:#a9b8d6;font-weight:500;letter-spacing:.6px;text-transform:uppercase}
  @media(max-width:560px){.brand .sub{display:none}}

  /* hero (landing) vs slim */
  .hero{text-align:center;padding:40px 22px 26px;transition:all .25s ease;position:relative;overflow:hidden;
    min-height:360px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .hero > *:not(.mesh):not(.orb-stage){position:relative;z-index:1}
  .hero .eyebrow .dot{display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--gold);margin-right:8px;vertical-align:middle}
  .hero .hero-underline{display:block;width:66px;height:3px;margin:0 auto 4px;border-radius:2px;
    background:linear-gradient(90deg,var(--gold),var(--gold-line))}

  /* crystal-ball data orb */
  .orb-stage{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:0;
    width:min(500px,88vw);height:min(500px,88vw);pointer-events:none}
  #orb-canvas{position:absolute;inset:0;width:100%;height:100%;
    -webkit-mask:radial-gradient(circle at 50% 50%, #000 55%, transparent 70%);
    mask:radial-gradient(circle at 50% 50%, #000 55%, transparent 70%)}
  .orb-glass{position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(120% 120% at 32% 24%, rgba(255,255,255,.14), rgba(255,255,255,.03) 24%, transparent 48%);
    box-shadow:inset 0 2px 34px rgba(255,255,255,.07), inset 0 -34px 72px rgba(8,16,38,.5), 0 46px 96px rgba(8,16,38,.55);
    border:1px solid rgba(255,255,255,.08)}
  .orb-glass::before{content:"";position:absolute;inset:-1px;border-radius:50%;
    background:conic-gradient(from 210deg, transparent 0deg, rgba(184,149,47,.6) 60deg, transparent 145deg, rgba(120,150,210,.5) 240deg, transparent 320deg);
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 2.5px), #000 calc(100% - 2.5px));
    mask:radial-gradient(farthest-side, transparent calc(100% - 2.5px), #000 calc(100% - 2.5px));
    animation:orbspin 22s linear infinite}
  @keyframes orbspin{to{transform:rotate(360deg)}}
  @media(max-width:560px){.hero{min-height:300px}.orb-stage{width:min(340px,86vw);height:min(340px,86vw)}}
  @media (prefers-reduced-motion: reduce){.orb-glass::before{animation:none}}
  .hero .eyebrow{display:inline-block;font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;
    color:#a8bce2;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
    padding:5px 14px;border-radius:999px;margin-bottom:18px}
  .hero h1{margin:0 0 12px;font-size:44px;font-weight:770;letter-spacing:-1.2px;line-height:1.03;
    background:linear-gradient(180deg,#ffffff 0%,#c9d7f2 100%);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 3px 18px rgba(6,12,30,.55))}
  .hero p{margin:0 auto 24px;font-size:15.5px;color:#b7c5e3;max-width:600px;line-height:1.55}
  @media(max-width:560px){.hero h1{font-size:30px}.hero{padding:34px 18px 22px}}
  body:not(.route-landing) .hero{display:none}
  body.route-landing .brand{display:none}

  /* ---------- Search ---------- */
  .search-shell{position:relative;max-width:640px;margin:0 auto;z-index:45}
  body:not(.route-landing) .search-shell{max-width:560px;margin:0;padding:10px 0 12px}
  body:not(.route-landing) .hwrap.search-row{display:flex;align-items:center;gap:16px}
  .search-box{position:relative;display:flex;align-items:center}
  .search-box svg{position:absolute;left:15px;width:18px;height:18px;color:var(--faint);pointer-events:none}
  #q{
    width:100%;font-size:16px;padding:14px 96px 14px 44px;border:1.5px solid transparent;
    border-radius:12px;outline:none;background:#fff;color:var(--ink);
    box-shadow:0 8px 30px rgba(10,20,45,.28);transition:box-shadow .18s,border-color .18s;
  }
  body:not(.route-landing) #q{padding:11px 74px 11px 42px;font-size:14.5px;box-shadow:0 4px 14px rgba(10,20,45,.22)}
  #q:focus{border-color:#9fb4dd}
  #q::placeholder{color:#9aa3b0}
  .kbd-hint{position:absolute;right:12px;display:flex;gap:5px;pointer-events:none}
  .kbd{font-size:11px;color:var(--faint);background:var(--chip);border:1px solid var(--line);
    border-radius:5px;padding:1px 6px;font-family:ui-monospace,Menlo,monospace}
  body:not(.route-landing) .kbd-hint .kbd.slash{display:none}

  /* ---------- Dropdown ---------- */
  #dropdown{
    position:absolute;left:0;right:0;top:calc(100% + 8px);background:#fff;border:1px solid var(--line);
    border-radius:14px;box-shadow:var(--shadow-lg);max-height:70vh;overflow-y:auto;display:none;text-align:left;
  }
  #dropdown.open{display:block}
  .dd-head{display:flex;justify-content:space-between;align-items:center;padding:9px 15px;
    border-bottom:1px solid var(--line-2);position:sticky;top:0;background:#fff;border-radius:14px 14px 0 0}
  .dd-head .cnt{font-size:12px;color:var(--muted)}
  .dd-head .cnt b{color:var(--navy)}
  .dd-sec{padding:6px 0}
  .dd-sec + .dd-sec{border-top:1px solid var(--line-2)}
  .dd-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);
    font-weight:700;padding:8px 15px 4px}
  .dd-item{display:flex;align-items:center;gap:11px;padding:9px 15px;cursor:pointer;transition:background .1s}
  .dd-item:hover,.dd-item.active{background:#eef3fb}
  .dd-item.active{box-shadow:inset 3px 0 0 var(--navy)}
  .dd-ico{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;
    font-size:12px;font-weight:700;background:var(--chip);color:var(--navy)}
  .dd-ico.company{background:#e6eefb;color:var(--navy)}
  .dd-main{min-width:0;flex:1}
  .dd-title{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dd-meta{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dd-badge{font-size:9.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:#fff;
    background:var(--navy);border-radius:5px;padding:2px 7px;flex:none}
  .dd-chev{color:var(--faint);flex:none;font-size:16px}
  .dd-empty{padding:26px 16px;text-align:center;color:var(--muted);font-size:13.5px}
  /* glossary card inside dropdown */
  .gcard{border:1px solid var(--gold-line);border-left:4px solid var(--gold);background:var(--gold-bg);
    border-radius:10px;padding:10px 13px;margin:6px 15px}
  .gcard .gterm{font-weight:700;color:#7a5c12;font-size:14px}
  .gcard .gcat{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.4px;
    background:#f0e6c6;color:#7a5c12;padding:1px 7px;border-radius:5px;margin-left:8px}
  .gcard .gdef{font-size:12.5px;color:#4a4632;margin-top:4px;white-space:pre-wrap}
  .gcard .gwhere{font-size:11px;color:#8a7c52;margin-top:5px}

  /* ---------- Body / views ---------- */
  main{max-width:1000px;margin:0 auto;padding:26px 22px 80px}
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:26px auto 0;max-width:none}
  @media(max-width:640px){.tiles{grid-template-columns:repeat(2,1fr)}}
  .tile{position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 16px 16px;
    box-shadow:var(--shadow);text-align:center;overflow:hidden;transition:transform .15s,box-shadow .15s,border-color .15s}
  .tile::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#4661a0,#1F3864)}
  .tile:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(31,56,100,.1);border-color:#cfdaee}
  .tile .v{font-size:27px;font-weight:770;color:var(--navy);letter-spacing:-.6px;line-height:1.1}
  .tile .l{font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
  .hint{text-align:center;color:var(--faint);font-size:12.5px;margin-top:22px}
  .hint .kbd{margin:0 2px}

  /* front-page feature cards */
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.9px;color:var(--faint);
    font-weight:700;margin:36px 2px 0}
  .features{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:12px}
  @media(max-width:700px){.features{grid-template-columns:1fr}}
  .fcard{position:relative;display:block;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:22px;text-decoration:none;color:inherit;box-shadow:var(--shadow);overflow:hidden;
    transition:transform .16s,box-shadow .16s,border-color .16s}
  .fcard::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(135deg,rgba(31,56,100,.035),transparent 46%)}
  .fcard:hover{transform:translateY(-3px);border-color:#bccae4;box-shadow:0 14px 34px rgba(31,56,100,.14)}
  .fcard .fico{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:22px;
    background:linear-gradient(135deg,#e9f0fc,#d9e5fb);box-shadow:inset 0 0 0 1px rgba(31,56,100,.06);margin-bottom:15px}
  .fcard h3{margin:0 0 6px;font-size:16.5px;font-weight:720;color:var(--navy-ink);letter-spacing:-.2px}
  .fcard p{margin:0;font-size:13px;color:var(--muted);line-height:1.55;max-width:94%}
  .fcard .farrow{position:absolute;top:22px;right:22px;color:var(--faint);font-size:20px;line-height:1;
    transition:transform .16s,color .16s}
  .fcard:hover .farrow{transform:translateX(4px);color:var(--navy)}

  /* back bar */
  .backbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .btn-back{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);
    color:var(--navy);font-size:13px;font-weight:600;padding:7px 13px;border-radius:9px;cursor:pointer;
    box-shadow:var(--shadow);transition:border-color .12s,transform .05s}
  .btn-back:hover{border-color:#bccae4}
  .btn-back:active{transform:translateY(1px)}

  /* company profile */
  .profile-head{background:linear-gradient(135deg,#fff 0%, #f2f6fc 100%);border:1px solid var(--line);
    border-radius:16px;padding:22px 24px;box-shadow:var(--shadow);margin-bottom:20px}
  .profile-head h1{margin:0;font-size:26px;font-weight:730;letter-spacing:-.4px;color:var(--navy-ink)}
  .profile-head .variants{font-size:12px;color:var(--muted);margin-top:6px}
  .profile-head .variants b{color:var(--ink);font-weight:600}
  .pstats{display:flex;flex-wrap:wrap;gap:20px;margin-top:18px}
  .pstat{min-width:90px}
  .pstat .v{font-size:20px;font-weight:730;color:var(--navy);letter-spacing:-.3px}
  .pstat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

  /* exposure gauge */
  .gauge{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .g-dial{position:relative;width:150px;height:90px;flex:none}
  .g-center{position:absolute;left:0;right:0;bottom:2px;text-align:center}
  .g-num{font-size:32px;font-weight:780;letter-spacing:-1px;line-height:1}
  .g-band{font-size:12px;text-transform:uppercase;letter-spacing:.6px;font-weight:800}
  .g-desc{font-size:12px;color:var(--muted);margin-top:5px;max-width:240px;line-height:1.5}
  @media (prefers-reduced-motion: reduce){.g-val{transition:none!important}}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;box-shadow:var(--shadow)}
  .panel h2{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);
    font-weight:700;display:flex;justify-content:space-between;align-items:baseline}
  .panel h2 .sum{color:var(--navy);font-size:13px;font-weight:700;text-transform:none;letter-spacing:0}

  /* timeline */
  .timeline{display:flex;align-items:flex-end;gap:6px;height:96px;padding-top:6px}
  .tl-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
  .tl-bar{width:70%;max-width:26px;background:linear-gradient(180deg,#3a5896,#1F3864);border-radius:4px 4px 2px 2px;
    min-height:3px;transition:height .3s ease;position:relative}
  .tl-bar span{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted);font-weight:600}
  .tl-yr{font-size:10px;color:var(--faint);white-space:nowrap}
  /* violation bars */
  .vbar{margin:9px 0}
  .vbar .vl{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px}
  .vbar .vl .vn{color:var(--ink)}
  .vbar .vl .vc{color:var(--muted);font-variant-numeric:tabular-nums}
  .vbar .track{height:7px;background:var(--line-2);border-radius:5px;overflow:hidden}
  .vbar .fill{height:100%;background:linear-gradient(90deg,#3a5896,#1F3864);border-radius:5px}

  /* record rows */
  .section{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
  .section > h2{margin:0;font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);
    font-weight:700;padding:14px 18px;border-bottom:1px solid var(--line-2);display:flex;justify-content:space-between;align-items:baseline}
  .section > h2 .sum{color:var(--navy);font-size:13px;font-weight:700;text-transform:none;letter-spacing:0}
  .row{display:flex;gap:13px;padding:13px 18px;cursor:pointer;border-bottom:1px solid var(--line-2);transition:background .1s}
  .row:last-child{border-bottom:none}
  .row:hover{background:#f5f8fd}
  .row .rl{flex:none;width:120px}
  .row .rdate{font-size:12.5px;font-weight:650;color:var(--navy)}
  .row .rtag{font-size:10.5px;color:var(--muted);margin-top:2px}
  .row .rbadge{display:inline-block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
    padding:1px 6px;border-radius:4px;margin-top:4px}
  .rbadge.warn{background:#fbe6e6;color:#a12b2b}
  .rbadge.untitled{background:#fdf0dd;color:#8a5a12}
  .row .rm{min-width:0;flex:1}
  .row .rtitle{font-size:13.5px;font-weight:600;color:var(--ink)}
  .row .rsnip{font-size:12.5px;color:#414b58;margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .row .rchev{color:var(--faint);align-self:center;flex:none}
  .empty-view{text-align:center;color:var(--muted);padding:50px 0}

  /* search-all row in dropdown */
  .dd-seeall .dd-ico{background:var(--navy);color:#fff;font-size:15px}
  .dd-seeall .dd-title{font-weight:650}
  .dd-seeall .dd-chev{font-size:13px;color:var(--faint)}

  /* full search results page */
  .results-head{margin-bottom:16px}
  .results-head h1{margin:0;font-size:23px;font-weight:730;letter-spacing:-.3px;color:var(--navy-ink)}
  .results-head .rsub{font-size:13px;color:var(--muted);margin-top:5px}
  .results-head .rsub b{color:var(--navy)}
  .controls{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:10px;padding:3px;box-shadow:var(--shadow);flex-wrap:wrap}
  .seg-btn{display:inline-flex;align-items:center;gap:6px;border:none;background:none;cursor:pointer;
    font-size:13px;font-weight:600;color:var(--muted);padding:6px 12px;border-radius:7px;transition:all .12s}
  .seg-btn:hover{color:var(--navy)}
  .seg-btn.on{background:var(--navy);color:#fff}
  .seg-n{font-size:11px;font-weight:700;background:var(--chip);color:var(--navy);border-radius:20px;padding:0 6px;min-width:18px;text-align:center}
  .seg-btn.on .seg-n{background:rgba(255,255,255,.22);color:#fff}
  .ctrl-right{display:flex;gap:10px;flex-wrap:wrap}
  .ctrl{display:inline-flex;align-items:center;gap:7px;font-size:11px;text-transform:uppercase;
    letter-spacing:.5px;color:var(--faint);font-weight:700}
  .ctrl select{font-family:inherit;font-size:13px;font-weight:500;text-transform:none;letter-spacing:0;
    color:var(--ink);border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 9px;
    box-shadow:var(--shadow);cursor:pointer;max-width:220px}

  /* ---------- Top nav ---------- */

  /* ---------- Print (company profile → PDF) ---------- */

<script>
"use strict";

/* =========================================================================
   Data model & indexing
   ========================================================================= */
let RECORDS = [], GLOSSARY = [];
let COMPANIES = new Map();      // key -> bucket
let STATS = {};
let currentBaseHash = "#/";

const CHANNEL_SHEETS = new Set(["TV Commercials","YouTube, Podcasts & Interviews",
  "Online Video","Social Media","Banner & Display Ads","Sales Aids & Print","Email",
  "Conferences & In-Person","Investor & Press"]);

const el = id => document.getElementById(id);
const pick = (rec, keys) => { for(const k of keys){ if(rec[k]!=null && rec[k]!=="") return rec[k]; } return null; };

const COMPANY_KEYS = ["Company","COMPANY"];
const YEAR_KEYS = ["Year","YEAR"];
const DATE_KEYS = ["Settlement Date","DATE","Date"];
const VTYPE_KEYS = ["Violation Type","VIOLATION TYPE","Doctrine","Violation Category","VIOLATION CATEGORY"];

function extractYear(v){
  if(v==null) return null;
  if(typeof v==="number" && v>=1900 && v<=2100) return String(v);
  const m = String(v).match(/(19|20)\d\d/);
  return m ? m[0] : null;
}
function recYear(rec){ return extractYear(pick(rec,YEAR_KEYS)) || extractYear(pick(rec,DATE_KEYS)); }
function recDate(rec){ return pick(rec, ["Settlement Date","DATE","Date"]); }

function recTitle(rec){
  const c = pick(rec, COMPANY_KEYS);
  if(c) return c;
  if(rec.Plaintiff) return rec.Plaintiff + (rec.Defendant ? " v. " + rec.Defendant : "");
  if(rec.Challenger) return rec.Challenger + (rec.Advertiser ? " v. " + rec.Advertiser : "");
  return "(untitled)";
}

const CORP_STOP = new RegExp("\\b(inc|incorporated|corp|corporation|company|co|llc|lp|llp|plc|ltd|"
  + "gmbh|usa|us|pharmaceuticals?|pharma|biopharma|healthcare|health|therapeutics|biosciences?|"
  + "biotech|medicines?|laboratories|labs|holdings|group|consumer)\\b","g");

// Normalize a company name to a merge key: drop parentheticals + corporate suffixes.
function normCompany(name){
  let s = String(name).toLowerCase();
  s = s.replace(/\([^)]*\)/g," ");          // drop "(copay foundation)", "(Parke-Davis)", etc.
  s = s.replace(/[.,/&'"’–—-]/g," ");
  s = s.replace(CORP_STOP," ");
  s = s.replace(/\s+/g," ").trim();
  return s;
}
// The "primary" display form of a raw name (parentheticals removed, trimmed).
function primaryName(name){
  return String(name).replace(/\([^)]*\)/g,"").replace(/\s+/g," ").trim() || String(name).trim();
}
// Score a display candidate: lower is better (prefer mixed-case, no parens, short).
function displayScore(name){
  let s = name.length;
  if(name === name.toUpperCase() && /[A-Z]/.test(name)) s += 40; // penalize ALL CAPS
  if(/[()]/.test(name)) s += 60;
  return s;
}

function buildIndex(){
  RECORDS.forEach((rec, i)=>{
    rec._id = i;
    rec._title = recTitle(rec);
    rec._year = recYear(rec);
    rec._hay = Object.entries(rec).filter(([k])=>k!=="source_sheet" && !k.startsWith("_"))
                 .map(([,v])=>String(v)).join("  ").toLowerCase();
  });

  // company associations: [rawName, role]
  for(const rec of RECORDS){
    const assoc = [];
    const c = pick(rec, COMPANY_KEYS);
    if(c) assoc.push([c,"company"]);
    if(rec.Plaintiff) assoc.push([rec.Plaintiff,"plaintiff"]);
    if(rec.Defendant) assoc.push([rec.Defendant,"defendant"]);
    if(rec.Challenger) assoc.push([rec.Challenger,"challenger"]);
    if(rec.Advertiser) assoc.push([rec.Advertiser,"advertiser"]);

    const seen = new Set();
    for(const [raw, role] of assoc){
      const key = normCompany(raw);
      if(!key || seen.has(key)) continue;
      seen.add(key);
      let b = COMPANIES.get(key);
      if(!b){ b = {key, names:new Map(), records:[]}; COMPANIES.set(key, b); }
      const disp = primaryName(raw);
      b.names.set(disp, (b.names.get(disp)||0)+1);
      b.records.push({rec, role});
    }
  }

  // choose display name + compute per-company summary
  for(const b of COMPANIES.values()){
    let best=null, bestScore=Infinity;
    for(const nm of b.names.keys()){ const sc=displayScore(nm); if(sc<bestScore){bestScore=sc;best=nm;} }
    b.display = best;
    b.variants = [...b.names.keys()].filter(n=>n!==best);
    b.summary = summarize(b);
    b._searchNames = [best, ...b.names.keys()].map(s=>s.toLowerCase());
  }

  // global stats
  const doj = RECORDS.filter(r=>r.source_sheet==="DOJ Settlements");
  STATS.records = RECORDS.length;
  STATS.companies = COMPANIES.size;
  STATS.dojTotal = doj.reduce((a,r)=> a + (typeof r["Total Amount"]==="number"? r["Total Amount"]:0), 0);
  STATS.glossary = GLOSSARY.length;
}

function catOf(sheet){
  if(sheet==="DOJ Settlements") return "doj";
  if(sheet==="OPDP Warning Letters"||sheet==="OPDP Untitled Letters") return "letter";
  if(sheet==="Direct Quotes") return "quote";
  if(sheet==="Pharma v Pharma Lawsuits") return "lawsuit";
  if(sheet==="NAD Challenges") return "nad";
  if(CHANNEL_SHEETS.has(sheet)) return "channel";
  return "other";
}

function summarize(b){
  const s = {doj:0, dojTotal:0, letters:0, quotes:0, lawsuits:0, nad:0, channels:0, total:b.records.length};
  for(const {rec} of b.records){
    switch(catOf(rec.source_sheet)){
      case "doj": s.doj++; if(typeof rec["Total Amount"]==="number") s.dojTotal+=rec["Total Amount"]; break;
      case "letter": s.letters++; break;
      case "quote": s.quotes++; break;
      case "lawsuit": s.lawsuits++; break;
      case "nad": s.nad++; break;
      case "channel": s.channels++; break;
    }
  }
  return s;
}

/* =========================================================================
   Formatting & text helpers
   ========================================================================= */
function fmtMoney(n){
  if(!n) return "$0";
  const a = Math.abs(n);
  if(a>=1e9) return "$" + (n/1e9).toFixed(2).replace(/\.?0+$/,"") + "B";
  if(a>=1e6) return "$" + Math.round(n/1e6) + "M";
  if(a>=1e3) return "$" + Math.round(n/1e3) + "K";
  return "$" + n;
}
function fmtMoneyFull(n){ return "$" + Number(n).toLocaleString("en-US"); }

// Count-up for numbers. fmt(v) optional (e.g. fmtMoney to keep a compact "$11.09B").
function countUp(el, end, prefix, fmt){
  const show = v => el.textContent = fmt ? fmt(v) : (prefix||"") + Math.round(v).toLocaleString();
  if(matchMedia('(prefers-reduced-motion: reduce)').matches){ show(end); return; }
  const t0 = performance.now(), dur = 1100;
  (function tick(t){
    const p = Math.min((t - t0)/dur, 1), eased = 1 - Math.pow(1 - p, 3);
    show(end*eased);
    if(p < 1) requestAnimationFrame(tick);
  })(performance.now());
}
// Reveal on load: add .in to every .anim/.draw inside a container.
function revealIn(root){ if(root) root.querySelectorAll('.anim, .draw').forEach(el => el.classList.add('in')); }

/* Crystal-ball data orb: a 3D field where every particle is one record,
   colored by type, rotating inside a glass sphere. Inhales toward the search
   box on focus, tilts with the cursor. Meaningful, not decorative. */
let orb = null;
function initOrb(){
  const stage = document.querySelector('.orb-stage');
  const canvas = document.getElementById('orb-canvas');
  const hero = document.querySelector('.hero');
  if(!stage || !canvas || !hero) return;
  const ctx = canvas.getContext('2d');
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const COL = { doj:[221,181,80], letter:[110,146,220], quote:[228,196,126],
    lawsuit:[132,174,222], nad:[152,168,198], channel:[186,206,240], other:[150,162,186] };
  const parts = RECORDS.map(r=>{
    const u=Math.random(), v=Math.random();
    const theta=Math.acos(2*u-1), phi=2*Math.PI*v, rad=Math.cbrt(0.18+0.82*Math.random());
    return { x:Math.sin(theta)*Math.cos(phi)*rad, y:Math.cos(theta)*rad, z:Math.sin(theta)*Math.sin(phi)*rad,
             c:COL[catOf(r.source_sheet)]||COL.other };
  });
  let W=0,H=0,R=0,cx=0,cy=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=stage.clientWidth; H=stage.clientHeight; if(!W||!H) return;
    canvas.width=W*dpr; canvas.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    cx=W/2; cy=H/2; R=Math.min(W,H)/2*0.92;
  }
  let yaw=0, tiltX=0, tiltY=0, tgtX=0, tgtY=0, pull=0, tgtPull=0, running=false, raf=0;
  hero.addEventListener('pointermove', e=>{ const b=hero.getBoundingClientRect();
    tgtY=((e.clientX-b.left)/b.width-0.5)*0.6; tgtX=((e.clientY-b.top)/b.height-0.5)*-0.5; });
  hero.addEventListener('pointerleave', ()=>{ tgtX=0; tgtY=0; });
  const q=document.getElementById('q');
  if(q){ q.addEventListener('focus', ()=>tgtPull=1); q.addEventListener('blur', ()=>tgtPull=0); }
  function frame(){
    if(!W) resize();
    yaw += 0.0016 + pull*0.004;
    tiltX += (tgtX-tiltX)*0.06; tiltY += (tgtY-tiltY)*0.06; pull += (tgtPull-pull)*0.05;
    const rs=R*(1-0.26*pull), aY=yaw+tiltY;
    const cY=Math.cos(aY), sY=Math.sin(aY), cX=Math.cos(tiltX), sX=Math.sin(tiltX);
    ctx.clearRect(0,0,W,H); ctx.globalCompositeOperation='lighter';
    const P=[];
    for(const p of parts){
      const x1=p.x*cY - p.z*sY, z1=p.x*sY + p.z*cY;
      const y1=p.y*cX - z1*sX, z2=p.y*sX + z1*cX;
      P.push({sx:cx+x1*rs, sy:cy+y1*rs, d:(z2+1)/2, c:p.c});
    }
    for(let i=0;i<P.length;i++){ const a=P[i];
      for(let j=i+1;j<P.length;j++){ const b=P[j];
        const dx=a.sx-b.sx, dy=a.sy-b.sy, d2=dx*dx+dy*dy;
        if(d2<1600){ const al=(1-Math.sqrt(d2)/40)*0.09*Math.min(a.d,b.d);
          if(al>0.012){ ctx.strokeStyle=`rgba(150,175,220,${al})`; ctx.lineWidth=.6;
            ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy); ctx.stroke(); } } } }
    for(const pt of P){
      const dxc=(pt.sx-cx)/R, dyc=(pt.sy-cy)/R, dc=Math.hypot(dxc*0.8, dyc*1.5);
      const clear = dc<0.6 ? 0.12+0.88*(dc/0.6) : 1;
      const a=(0.15+0.7*pt.d)*clear*(0.72+0.5*pull), size=(0.6+1.7*pt.d)*(1+0.3*pull);
      const c=pt.c;
      ctx.beginPath(); ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${a*0.25})`; ctx.arc(pt.sx,pt.sy,size*3,0,7); ctx.fill();
      ctx.beginPath(); ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${a})`; ctx.arc(pt.sx,pt.sy,size,0,7); ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
    if(running) raf=requestAnimationFrame(frame);
  }
  orb = {
    start(){ resize(); if(reduce){ running=false; frame(); return; } if(running) return; running=true; frame(); },
    stop(){ running=false; cancelAnimationFrame(raf); }
  };
  window.addEventListener('resize', ()=>{ resize(); if(!running) frame(); });
  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden) orb.stop(); else if(document.body.classList.contains('route-landing')) orb.start();
  });
}
function orbSync(){ if(orb){ document.body.classList.contains('route-landing') ? orb.start() : orb.stop(); } }

/* Company Exposure Index: composite risk read from the record set. */
function computeRisk(b, s){
  const yrs=b.records.map(x=>parseInt(x.rec._year)).filter(n=>!isNaN(n));
  const recent=yrs.length?Math.max(...yrs):2004;
  const recency=Math.max(0,Math.min(1,(recent-2004)/22));
  const money=s.dojTotal? Math.min(1, Math.log10(s.dojTotal)/10):0;
  const vol=Math.min(1, s.total/12), letters=Math.min(1, s.letters/6), lit=Math.min(1, s.lawsuits/3);
  const score=Math.round(100*(0.32*money+0.24*letters+0.18*vol+0.14*recency+0.12*lit));
  let band,color;
  if(score<25){band="Low";color="#5b7fc7";}
  else if(score<50){band="Moderate";color="#3a5896";}
  else if(score<70){band="Elevated";color="#b8952f";}
  else {band="High";color="#c1552f";}
  return {score,band,color,recent};
}
function gaugeHtml(risk){
  const LEN=251.3, off=LEN*(1-risk.score/100);
  return `<div class="gauge">
    <div class="g-dial">
      <svg width="150" height="90" viewBox="0 0 200 116" aria-hidden="true">
        <path d="M20 100 A80 80 0 0 1 180 100" fill="none" stroke="var(--line-2)" stroke-width="14" stroke-linecap="round"/>
        <path class="g-val" data-off="${off.toFixed(1)}" d="M20 100 A80 80 0 0 1 180 100" fill="none"
          stroke="${risk.color}" stroke-width="14" stroke-linecap="round"
          stroke-dasharray="${LEN}" stroke-dashoffset="${LEN}" style="transition:stroke-dashoffset 1.1s var(--ease-out)"/>
      </svg>
      <div class="g-center"><span class="g-num" data-count="${risk.score}" style="color:${risk.color}">0</span></div>
    </div>
    <div><div class="g-band" style="color:${risk.color}">${risk.band} exposure</div>
      <div class="g-desc">Composite of settlement dollars, FDA letters, litigation, record volume and recency. Latest action ${risk.recent}.</div></div>
  </div>`;
}
// Other companies sharing at least one violation type, ranked by overlap.
function relatedCompanies(b){
  const myV=new Set(b.records.map(x=>pick(x.rec,VTYPE_KEYS)).filter(Boolean));
  if(!myV.size) return [];
  const out=[];
  for(const o of COMPANIES.values()){
    if(o===b) continue;
    let shared=0;
    for(const v of new Set(o.records.map(x=>pick(x.rec,VTYPE_KEYS)).filter(Boolean))) if(myV.has(v)) shared++;
    if(shared) out.push([o,shared]);
  }
  out.sort((a,b)=> b[1]-a[1] || b[0].records.length-a[0].records.length);
  return out.slice(0,8);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
let HLQ = "";
function hl(s){
  const esc = escapeHtml(s);
  if(!HLQ) return esc;
  const needle = escapeHtml(HLQ).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  try{ return esc.replace(new RegExp(needle,"gi"), m=>"<mark>"+m+"</mark>"); }
  catch(e){ return esc; }
}
function linkify(escapedHtml){
  return escapedHtml.replace(/(https?:\/\/[^\s<]+)/g, u=>`<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
}
function snippet(text, q, radius){
  radius = radius || 90;
  let s = String(text).replace(/\s*\n\s*/g," ");
  if(q){
    const idx = s.toLowerCase().indexOf(q.toLowerCase());
    if(idx>=0){
      const start=Math.max(0,idx-radius), end=Math.min(s.length, idx+q.length+radius);
      s = (start>0?"… ":"") + s.slice(start,end) + (end<s.length?" …":"");
    } else if(s.length>2*radius){ s = s.slice(0,2*radius) + " …"; }
  } else if(s.length>2*radius){ s = s.slice(0,2*radius) + " …"; }
  return s;
}

/* =========================================================================
   Fuzzy matching
   ========================================================================= */
// returns a score (higher better) or null.
// fuzzy=true adds subsequence (typo-tolerant) matching, only sensible for short
// strings like titles/company/glossary terms, not the full record haystack.
function matchScore(text, q, fuzzy){
  text = text.toLowerCase();
  const i = text.indexOf(q);
  if(i===0) return 1000;
  if(i>0){ const wb = /\W|_/.test(text[i-1]); return (wb?820:640) - Math.min(i,200); }
  if(fuzzy===false) return null;
  // subsequence fuzzy
  let ti=0, qi=0, gaps=0, last=-2, started=false;
  for(; ti<text.length && qi<q.length; ti++){
    if(text[ti]===q[qi]){ if(started && ti!==last+1) gaps++; started=true; last=ti; qi++; }
  }
  if(qi===q.length) return 240 - gaps*4;
  return null;
}

function searchAll(raw){
  const q = raw.trim().toLowerCase();
  if(!q) return {companies:[], records:[], glossary:[], total:0};

  // companies
  const comp = [];
  for(const b of COMPANIES.values()){
    let best=null;
    for(const nm of b._searchNames){ const sc=matchScore(nm,q); if(sc!=null && (best==null||sc>best)) best=sc; }
    if(best!=null) comp.push([best + Math.min(b.records.length,20), b]);
  }
  comp.sort((a,b)=> b[0]-a[0]);

  // records
  const recs = [];
  for(const r of RECORDS){
    const st = matchScore(r._title, q);
    const sh = matchScore(r._hay, q, false);   // body: substring only, no fuzzy noise
    let sc = null;
    if(st!=null) sc = st + 120;
    else if(sh!=null) sc = sh;
    if(sc!=null) recs.push([sc, r]);
  }
  recs.sort((a,b)=> b[0]-a[0]);

  // glossary
  const gl = [];
  for(const g of GLOSSARY){
    const stt = matchScore(g.Term||"", q);
    const sd = matchScore(g.Definition||"", q, false);
    let sc = null;
    if(stt!=null) sc = stt + 120; else if(sd!=null) sc = sd;
    if(sc!=null) gl.push([sc, g]);
  }
  gl.sort((a,b)=> b[0]-a[0]);

  const fullC = comp.map(x=>x[1]), fullR = recs.map(x=>x[1]), fullG = gl.map(x=>x[1]);
  return {
    companies: fullC.slice(0,6),
    records: fullR.slice(0,8),
    glossary: fullG.slice(0,5),
    counts: {companies:fullC.length, records:fullR.length, glossary:fullG.length},
    total: comp.length + recs.length + gl.length,
    full: {companies:fullC, records:fullR, glossary:fullG}
  };
}

    html += `<div class="dd-sec"><div class="dd-label">Records</div>`;
    for(const r of res.records){
      const meta = [r._year, r.Channel||r.CHANNEL||r["Legal Basis"]].filter(Boolean).join(" · ");
      const snipField = firstMatchField(r, HLQ);

            + `<div class="dd-meta" style="white-space:normal">${snipField}</div></div>`
            + `<div class="dd-chev">›</div></div>`;

function firstMatchField(rec, q){
  const ql = q.toLowerCase();
  for(const [k,v] of Object.entries(rec)){
    if(k==="source_sheet"||k.startsWith("_")) continue;
    const s=String(v);
    if(s.toLowerCase().includes(ql)) return `<em style="font-style:normal;color:var(--faint)">${escapeHtml(k)}:</em> ${hl(snippet(s,q,70))}`;
  }
  const def = pick(rec, ["Summary","SUMMARY","Allegation Summary","Issue Summary","WHAT THEY SAID","Notes","NOTES"]);
  return def ? hl(snippet(String(def), "", 70)) : "";
}

function sheetShort(s){
  const map={"DOJ Settlements":"DOJ","OPDP Warning Letters":"Warning","OPDP Untitled Letters":"Untitled",
    "Direct Quotes":"Quote","Pharma v Pharma Lawsuits":"Lawsuit","NAD Challenges":"NAD",
    "TV Commercials":"TV","YouTube, Podcasts & Interviews":"YouTube","Online Video":"Video",
    "Social Media":"Social","Banner & Display Ads":"Banner","Sales Aids & Print":"Print",
    "Email":"Email","Conferences & In-Person":"Conf.","Investor & Press":"Investor"};
  return map[s]||s;
}

         <div class="rsub" id="rsub"></div>
       </div>
       <div id="search-body"></div>`;
  wireBack();
  renderSearchResults();
}

function sheetsOf(recs){ return new Set(recs.map(r=>r.source_sheet)); }

function renderSearchResults(){
  if(!searchRes) return;
  const f = searchRes.full, c = searchRes.counts;
  const st = searchState;

  // ---- records: filter by sheet, then sort ----
  let recs = f.records.slice();
  if(st.sheet) recs = recs.filter(r=>r.source_sheet===st.sheet);
  if(st.sort==="newest") recs.sort((a,b)=> dnum(b)-dnum(a));
  else if(st.sort==="oldest") recs.sort((a,b)=> dnum(a)-dnum(b));
  else if(st.sort==="company") recs.sort((a,b)=> String(a._title).localeCompare(String(b._title)));
  // "relevance" keeps original scored order

  const showC = (st.type==="all"||st.type==="companies");
  const showR = (st.type==="all"||st.type==="records");
  const showG = (st.type==="all"||st.type==="glossary");

  // ---- subheading ----
  const shownRecords = showR ? recs.length : 0;
  const sub = [];
  if(showR) sub.push(`<b>${recs.length}</b> record${recs.length===1?"":"s"} across <b>${sheetsOf(recs).size}</b> sheet${sheetsOf(recs).size===1?"":"s"}`);
  if(showC && f.companies.length) sub.push(`<b>${f.companies.length}</b> compan${f.companies.length===1?"y":"ies"}`);
  if(showG && f.glossary.length) sub.push(`<b>${f.glossary.length}</b> glossary term${f.glossary.length===1?"":"s"}`);
  el("rsub").innerHTML = sub.join(" · ") || "No matches.";

  // ---- controls ----
  const seg = (val,label,n)=>`<button class="seg-btn ${st.type===val?"on":""}" data-type="${val}">${label}<span class="seg-n">${n}</span></button>`;
  let controls = `<div class="controls">
     <div class="seg">
       ${seg("all","All", searchRes.total)}
       ${seg("companies","Companies", c.companies)}
       ${seg("records","Records", c.records)}
       ${seg("glossary","Glossary", c.glossary)}
     </div>
     <div class="ctrl-right">`;
  if(showR && c.records){
    const sheets=[...sheetsOf(f.records)].sort();
    controls += `<label class="ctrl">Sheet
       <select id="f-sheet"><option value="">All sheets (${c.records})</option>`
       + sheets.map(s=>`<option value="${escapeHtml(s)}" ${st.sheet===s?"selected":""}>${escapeHtml(s)} (${f.records.filter(r=>r.source_sheet===s).length})</option>`).join("")
       + `</select></label>`;
    controls += `<label class="ctrl">Sort
       <select id="f-sort">
         <option value="relevance" ${st.sort==="relevance"?"selected":""}>Relevance</option>
         <option value="newest" ${st.sort==="newest"?"selected":""}>Newest first</option>
         <option value="oldest" ${st.sort==="oldest"?"selected":""}>Oldest first</option>
         <option value="company" ${st.sort==="company"?"selected":""}>Company A–Z</option>
       </select></label>`;
  }
  if(showR && c.records) controls += `<button class="btn-act" data-act="export">⤓ Export CSV</button>`;
  controls += `</div></div>`;
  exportSet = {name:"search-"+searchState.q, records:recs};

  // ---- lists ----
  let body = controls;

  if(showC && f.companies.length){
    body += sectionOpen("Companies", `${f.companies.length}`);
    for(const b of f.companies) body += companyRowHtml(b);
    body += `</div>`;
  }

  if(showR){
    body += sectionOpen("Records", `${recs.length}`);
    if(recs.length){ for(const r of recs) body += searchRecordRow(r); }
    else body += `<div style="padding:22px 18px;color:var(--muted);font-size:13.5px">No records match this filter.</div>`;
    body += `</div>`;
  }

  if(showG && f.glossary.length){
    body += `<div class="section"><h2>Glossary<span class="sum">${f.glossary.length}</span></h2><div style="padding:8px 8px 12px">`;
    for(const g of f.glossary){
      body += `<div class="gcard"><div><span class="gterm">${hl(g.Term||"")}</span>`
            + (g.Category?`<span class="gcat">${escapeHtml(g.Category)}</span>`:"") + `</div>`
            + `<div class="gdef">${hl(g.Definition||"")}</div>`
            + (g["Where It Appears"]?`<div class="gwhere">Appears in: ${escapeHtml(g["Where It Appears"])}</div>`:"")
            + `</div>`;
    }
    body += `</div></div>`;
  }

  if(!f.companies.length && !recs.length && !f.glossary.length){
    body += `<div class="empty-view">No matches for “${escapeHtml(st.q)}”. Try a broader term.</div>`;
  }

  el("search-body").innerHTML = body;

  // ---- wire ----
  el("search-body").querySelectorAll(".seg-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{ searchState.type=btn.dataset.type; renderSearchResults(); });
  });
  const fs=el("f-sheet"); if(fs) fs.addEventListener("change", ()=>{ searchState.sheet=fs.value; renderSearchResults(); });
  const so=el("f-sort"); if(so) so.addEventListener("change", ()=>{ searchState.sort=so.value; renderSearchResults(); });
  el("search-body").querySelectorAll("[data-act]").forEach(n=> n.addEventListener("click", ()=>{ if(exportSet) downloadCSV(exportSet.records, exportSet.name); }));
  el("search-body").querySelectorAll(".row[data-id]").forEach(r=>{
    r.addEventListener("click", ()=> location.hash = "#/record/" + r.dataset.id);
  });
  el("search-body").querySelectorAll(".row[data-company]").forEach(r=>{
    r.addEventListener("click", ()=> location.hash = "#/company/" + encodeURIComponent(r.dataset.company));
  });
}

function companyRowHtml(b){
  const s=b.summary, bits=[];
  if(s.doj) bits.push(`${s.doj} DOJ`);
  if(s.letters) bits.push(`${s.letters} FDA letter${s.letters>1?"s":""}`);
  if(s.quotes) bits.push(`${s.quotes} quote${s.quotes>1?"s":""}`);
  if(s.lawsuits) bits.push(`${s.lawsuits} lawsuit${s.lawsuits>1?"s":""}`);
  if(s.nad) bits.push(`${s.nad} NAD`);
  if(s.channels) bits.push(`${s.channels} channel`);
  if(!bits.length) bits.push(`${s.total} record${s.total>1?"s":""}`);
  const initials = b.display.replace(/[^A-Za-z ]/g,"").split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase() || "•";
  return `<div class="row" data-company="${escapeHtml(b.key)}">
      <div class="rl"><div class="dd-ico company" style="margin:0">${escapeHtml(initials)}</div></div>
      <div class="rm"><div class="rtitle">${hl(b.display)}</div>
        <div class="rsnip">${escapeHtml(bits.join(" · "))}${s.dojTotal?` · <b style="color:var(--navy)">${fmtMoney(s.dojTotal)}</b>`:""}</div></div>
      <div class="rchev">›</div></div>`;
}

function rowHtml(rec, leftTop, leftTag, badge, title, snip){

function sectionOpen(title, sum){
  return `<div class="section"><h2>${escapeHtml(title)}${sum?`<span class="sum">${sum}</span>`:""}</h2>`;
}
function byDateDesc(a,b){ return (dnum(b.rec)) - (dnum(a.rec)); }
function byYearDesc(a,b){ return (parseInt(a.rec._year)||0) < (parseInt(b.rec._year)||0) ? 1 : -1; }
function dnum(rec){
  const d = recDate(rec);
  if(d){ const t=Date.parse(d); if(!isNaN(t)) return t; }
  const y=parseInt(rec._year); return isNaN(y)?0:Date.parse(y+"-01-01");
}
function fmtDate(v){
  if(!v) return null;
  const t=Date.parse(v);
  if(isNaN(t)) return String(v);
  const d=new Date(t);
  return d.toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"});
}

function timelineHtml(b){
  const counts = new Map();
  for(const {rec} of b.records){ const y=rec._year; if(y) counts.set(y,(counts.get(y)||0)+1); }
  if(!counts.size) return `<div style="color:var(--muted);font-size:13px">No dated records.</div>`;
  const years=[...counts.keys()].map(Number).sort((a,b)=>a-b);
  const max=Math.max(...counts.values());
  let out=`<div class="timeline">`;
  for(const y of years){
    const c=counts.get(String(y));
    const h=Math.round(14 + (c/max)*70);
    out += `<div class="tl-col"><div class="tl-bar" style="height:${h}px"><span>${c}</span></div><div class="tl-yr">${y}</div></div>`;
  }
  return out + `</div>`;
}

function violationsHtml(b){
  const counts=new Map();
  for(const {rec} of b.records){
    const v=pick(rec, VTYPE_KEYS);
    if(v) counts.set(v,(counts.get(v)||0)+1);
  }
  if(!counts.size) return `<div style="color:var(--muted);font-size:13px">No violation types recorded.</div>`;
  const top=[...counts.entries()].sort((a,b)=>b[1]-a[1]).slice(0,5);
  const max=top[0][1];
  return top.map(([name,c])=>
    `<div class="vbar"><div class="vl"><span class="vn">${escapeHtml(name)}</span><span class="vc">${c}</span></div>`
    + `<div class="track"><div class="fill" style="width:${Math.round(c/max*100)}%"></div></div></div>`).join("");
}

// Central click wiring for a rendered scope: record rows, company targets, hash links, actions.
function wireCommon(scope){
  scope = scope || el("app");
  scope.querySelectorAll("[data-id]").forEach(n=> n.addEventListener("click", e=>{
    if(e.target.closest("a,[data-href],[data-company]")) return;
    location.hash = "#/record/" + n.dataset.id;
  }));
  scope.querySelectorAll("[data-company]").forEach(n=> n.addEventListener("click", e=>{
    if(e.target.closest("[data-href]")) return;
    location.hash = "#/company/" + encodeURIComponent(n.dataset.company);
  }));
  scope.querySelectorAll("[data-href]").forEach(n=> n.addEventListener("click", ()=>{ location.hash = n.dataset.href; }));
  scope.querySelectorAll("[data-act]").forEach(n=> n.addEventListener("click", ()=>{
    const a = n.dataset.act;
    if(a==="export"){ if(exportSet) downloadCSV(exportSet.records, exportSet.name); }
    else if(a==="copy") copyLink(n);
    else if(a==="print") window.print();
  }));
}

function csvEsc(v){ v = v==null ? "" : String(v); return /[",\n\r]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
function downloadCSV(records, name){
  if(!records || !records.length) return;
  const cols=[], seen=new Set();
  records.forEach(r=> Object.keys(r).forEach(k=>{
    if(k!=="source_sheet" && !k.startsWith("_") && !seen.has(k)){ seen.add(k); cols.push(k); }
  }));
  const header=["source_sheet", ...cols];
  const lines=[header.map(csvEsc).join(",")];
  for(const r of records) lines.push(header.map(h=>csvEsc(r[h])).join(","));
  const blob=new Blob(["﻿"+lines.join("\r\n")], {type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=(name||"records").replace(/[^\w.-]+/g,"-").replace(/^-+|-+$/g,"") + ".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}
function copyLink(btn){
  const url=location.href;
  const done=()=>{ const t=btn.textContent; btn.textContent="✓ Copied"; setTimeout(()=>{btn.textContent=t;},1400); };
  if(navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(url).then(done).catch(()=>fallbackCopy(url,done));
  else fallbackCopy(url,done);
}
function fallbackCopy(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta); done && done();
}

function hbars(entries){
  if(!entries.length) return `<div style="color:var(--muted);font-size:13px">No data.</div>`;
  const max=Math.max(...entries.map(e=>e[1]));
  return entries.map(([label,val,href])=>{
    const inner = `<div class="hb-l">${escapeHtml(String(label))}</div>`
      + `<div class="hb-v">${escapeHtml(String(val))}</div>`
      + `<div class="hb-track"><div class="hb-fill" style="width:${max?Math.round(val/max*100):0}%"></div></div>`;
    return href ? `<a class="hb" data-href="${href}">${inner}</a>` : `<div class="hb">${inner}</div>`;
  }).join("");
}
function ychart(years, valOf, labelOf, titleOf){
  const vals=years.map(valOf);
  const max=Math.max(1, ...vals);
  return `<div class="ychart">` + years.map((y,i)=>{
    const v=vals[i]; const h=Math.round(6 + (v/max)*126);
    return `<a class="yc" data-href="#/browse/year/${encodeURIComponent(y)}" title="${escapeHtml(titleOf(y,v))}">`
      + `<div class="yc-v">${escapeHtml(labelOf(v))}</div>`
      + `<div class="yc-bar" style="height:${h}px"></div>`
      + `<div class="yc-y">${escapeHtml("’"+String(y).slice(2))}</div></a>`;
  }).join("") + `</div>`;
}

      + ychart(years, y=>byYear.get(y)||0, v=>String(v), (y,v)=>`${y}: ${v} record${v===1?"":"s"}`) + `</div>`
    + `<div class="panel wide"><h2>DOJ settlement dollars by year<span class="sum">${fmtMoney(STATS.dojTotal)}</span></h2>`
      + ychart(dojYears, y=>dojYear.get(y)||0, v=>fmtMoney(v), (y,v)=>`${y}: ${fmtMoneyFull(v)}`) + `</div>`
    + `<div class="panel"><h2>Top violation types</h2>`
      + hbars(topVio.map(([n,c])=>[n,c,`#/browse/violation/${encodeURIComponent(n)}`])) + `</div>`
    + `<div class="panel"><h2>Most-cited companies</h2>`
      + hbars(topCo.map(b=>[b.display, b.records.length, `#/company/${encodeURIComponent(b.key)}`])) + `</div>`

  const recs = RECORDS.filter(r=>{
    if(dim==="violation") return pick(r,VTYPE_KEYS)===value;

function renderBrowseBody(recs, label, value){
  const st=browseState;
  let rows=recs.slice();
  if(st.sort==="newest") rows.sort((a,b)=>dnum(b)-dnum(a));
  else if(st.sort==="oldest") rows.sort((a,b)=>dnum(a)-dnum(b));
  else if(st.sort==="company") rows.sort((a,b)=>String(a._title).localeCompare(String(b._title)));
  exportSet = {name:"browse-"+label+"-"+value, records:rows};

  const nSheets=new Set(rows.map(r=>r.source_sheet)).size;
  el("brsub").innerHTML = `<b>${rows.length}</b> record${rows.length===1?"":"s"} across <b>${nSheets}</b> sheet${nSheets===1?"":"s"}`;

  let body = `<div class="controls"><div></div><div class="ctrl-right">
      <label class="ctrl">Sort
        <select id="b-sort">
          <option value="newest" ${st.sort==="newest"?"selected":""}>Newest first</option>
          <option value="oldest" ${st.sort==="oldest"?"selected":""}>Oldest first</option>
          <option value="company" ${st.sort==="company"?"selected":""}>Company A–Z</option>
        </select></label>
      <button class="btn-act" data-act="export">⤓ Export CSV</button>
    </div></div>`;
  body += `<div class="section"><h2>Records<span class="sum">${rows.length}</span></h2>`;
  if(rows.length){ for(const r of rows) body += searchRecordRow(r); }
  else body += `<div style="padding:22px 18px;color:var(--muted);font-size:13.5px">No records.</div>`;
  body += `</div>`;
  el("browse-body").innerHTML = body;

  const so=el("b-sort"); if(so) so.addEventListener("change", ()=>{ browseState.sort=so.value; renderBrowseBody(recs,label,value); });
  wireCommon(el("browse-body"));
}

function quoteCard(r){
  const said=r["WHAT THEY SAID"]||"";
  const why=r["WHY FDA FLAGGED IT"]||"";
  const vt=pick(r,VTYPE_KEYS);
  const meta=[r.COMPANY, r.PRODUCT, fmtDate(r.DATE)||r._year, r.CHANNEL].filter(Boolean);

      <div class="qsaid">${hl(snippet(said, HLQ, 320))}</div>`
    + (why?`<div class="qwhy"><b>Why flagged:</b> ${hl(snippet(why, HLQ, 260))}</div>`:"")
    + `<div class="qmeta">`
      + meta.map(m=>`<span class="qtag">${escapeHtml(String(m))}</span>`).join("")
      + (vt?`<span class="qtag vt">${escapeHtml(vt)}</span>`:"")
    + `</div></div>`;
}

/* =========================================================================
   Cross-linking: glossary annotation of record text
   ========================================================================= */
let GLOSS_RE=null, GLOSS_MAP=null;
function ensureGlossIndex(){
  if(GLOSS_MAP) return;
  GLOSS_MAP=new Map(); const keys=[];
  for(const g of GLOSSARY){
    const term=g.Term||""; if(!term) continue;
    const cands=[];
    const base=term.replace(/\s*\([^)]*\)\s*/g," ").trim(); if(base) cands.push(base);
    const abbr=(term.match(/\(([^)]+)\)/)||[])[1];
    if(abbr && /^[A-Za-z][A-Za-z0-9][A-Za-z0-9.\/ -]*$/.test(abbr.trim())) cands.push(abbr.trim());
    for(const c of cands){
      if(c.length<3) continue;
      const kl=c.toLowerCase();
      if(!GLOSS_MAP.has(kl)){ GLOSS_MAP.set(kl, {term:g.Term, def:g.Definition||""}); keys.push(c); }
    }
  }
  keys.sort((a,b)=>b.length-a.length);
  const esc=keys.map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"));
  GLOSS_RE = esc.length ? new RegExp("\\b("+esc.join("|")+")\\b","gi") : null;
}
// Escape + URL-linkify + wrap known glossary terms (first occurrence) with hover definitions.
function annotate(raw){
  const s=String(raw);
  ensureGlossIndex();
  if(!GLOSS_RE) return linkify(escapeHtml(s));
  GLOSS_RE.lastIndex=0;
  let out="", last=0, m; const used=new Set();
  while((m=GLOSS_RE.exec(s))){
    out += linkify(escapeHtml(s.slice(last, m.index)));
    const kl=m[0].toLowerCase(), info=GLOSS_MAP.get(kl);
    if(info && !used.has(kl)){
      used.add(kl);
      out += `<span class="gloss" title="${escapeHtml(info.term + ": " + info.def)}">${escapeHtml(m[0])}</span>`;
    } else out += escapeHtml(m[0]);
    last = m.index + m[0].length;
  }
  out += linkify(escapeHtml(s.slice(last)));
  return out;
}

/* ---- record slide-over ---- */
const MONEY_KEYS = new Set(["Total Amount","Federal Civil","Criminal Fine","State Share","Relator Award"]);
const PROSE_KEYS = new Set(["Summary","SUMMARY","Notes","NOTES","Allegation Summary","Issue Summary",
  "Compliance Lesson","Rule Established","Definition"]);
function isProse(s){ return s.includes("\n") || s.length>90; }
function prettyLabel(k){ return /[a-z]/.test(k) ? k : k.toLowerCase().replace(/\b\w/g, c=>c.toUpperCase()); }
// Render prose: dash-bulleted blocks become real lists, otherwise paragraphs.
function proseHtml(text){
  const lines = String(text).split(/\n/).map(l=>l.trim()).filter(Boolean);
  const bullety = lines.filter(l=>/^[-•·*]\s?/.test(l)).length;
  if(bullety>=2 && bullety>=lines.length*0.6){
    return `<ul class="prose-list">` + lines.map(l=>`<li>${annotate(l.replace(/^[-•·*]\s?/,""))}</li>`).join("") + `</ul>`;
  }
  return lines.map(l=>`<p>${annotate(l)}</p>`).join("");
}

function openRecord(id){
  const rec = RECORDS[id];
  const panel = el("panel"), backdrop = el("backdrop");
  if(!rec){ closeRecord(); return; }
  const sheet = rec.source_sheet;
  const vt = pick(rec, VTYPE_KEYS);

  // Fields consumed by the header/title/links are excluded from the body.
  const used = new Set(["source_sheet","#","Company","COMPANY","Plaintiff","Defendant","Challenger","Advertiser",
    "Year","YEAR","Era","WHAT THEY SAID","WHY FDA FLAGGED IT"]);

  // Header fact strip
  const meta=[];
  const metaPush=(label,val,keys)=>{ if(val==null||val==="") return; meta.push([label,String(val)]); (keys||[]).forEach(k=>used.add(k)); };
  const dv=recDate(rec);
  metaPush("Date", dv?fmtDate(dv):rec._year, ["Settlement Date","DATE","Date"]);
  metaPush("Product", rec.PRODUCT||rec.Product, ["PRODUCT","Product"]);
  metaPush("Channel", rec.CHANNEL||rec.Channel, ["CHANNEL","Channel"]);
  metaPush("Audience", rec.AUDIENCE||rec.Audience, ["AUDIENCE","Audience"]);
  metaPush("Violation", vt, ["Violation Type","VIOLATION TYPE","Doctrine","Violation Category","VIOLATION CATEGORY"]);
  metaPush("Court", rec["Citation / Court"], ["Citation / Court"]);
  metaPush("District", rec.District, ["District"]);
  metaPush("Legal basis", rec["Legal Basis"], ["Legal Basis"]);
  metaPush("Type", rec["Civil / Criminal"], ["Civil / Criminal"]);

  // Split remaining fields into prose sections, a details grid, and a source CTA.
  let cta="";
  const said=rec["WHAT THEY SAID"], why=rec["WHY FDA FLAGGED IT"];
  const proseSecs=[], facts=[];
  for(const [k,v] of Object.entries(rec)){
    if(k.startsWith("_") || used.has(k)) continue;
    const sval=String(v).trim();
    if(sval==="") continue;
    if(/^https?:\/\//.test(sval) && sval.split(/\s+/).length===1){ if(!cta) cta=sval; continue; }
    if(PROSE_KEYS.has(k) || isProse(sval)) proseSecs.push([k,sval]);
    else facts.push([k, (MONEY_KEYS.has(k) && typeof v==="number") ? fmtMoneyFull(v) : sval]);
  }

  // Related cross-links
  const rel=[]; const seenCo=new Set();
  const addCo = raw => { if(!raw) return; const key=normCompany(raw);
    if(key && COMPANIES.has(key) && !seenCo.has(key)){ seenCo.add(key);
      rel.push(`<a class="rel-co" data-href="#/company/${encodeURIComponent(key)}">🏢 ${escapeHtml(COMPANIES.get(key).display)}</a>`); } };
  addCo(pick(rec,COMPANY_KEYS)); addCo(rec.Plaintiff); addCo(rec.Defendant); addCo(rec.Challenger); addCo(rec.Advertiser);
  if(vt) rel.push(`<a class="rel-v" data-href="#/browse/violation/${encodeURIComponent(vt)}">${escapeHtml(vt)}</a>`);
  if(rec._year) rel.push(`<a class="rel-v" data-href="#/browse/year/${encodeURIComponent(rec._year)}">${escapeHtml(rec._year)}</a>`);

  // Assemble
  const metaHtml = meta.length ? `<div class="read-meta">` + meta.map(([l,v])=>
    `<div class="rm-item"><div class="rm-l">${escapeHtml(l)}</div><div class="rm-v">${hl(v)}</div></div>`).join("") + `</div>` : "";
  let body="";
  if(said) body += `<blockquote class="read-quote anim">${annotate(said)}</blockquote>`;
  if(said && why) body += `<div class="read-why anim"><span class="rw-l">Why FDA flagged it</span>${annotate(why)}</div>`;
  for(const [k,v] of proseSecs)
    body += `<section class="read-sec anim"><h4>${escapeHtml(prettyLabel(k))}</h4><div class="prose">${proseHtml(v)}</div></section>`;
  if(facts.length)
    body += `<section class="read-sec anim"><h4>Details</h4><div class="facts">` + facts.map(([k,v])=>
      `<div class="fact"><div class="f-k">${escapeHtml(prettyLabel(k))}</div><div class="f-v">${annotate(v)}</div></div>`).join("") + `</div></section>`;
  if(cta) body += `<div class="read-cta anim"><a href="${escapeHtml(cta)}" target="_blank" rel="noopener">Open source ↗</a></div>`;
  if(rel.length) body += `<section class="read-sec anim"><h4>Explore related</h4><div class="rel">${rel.join("")}</div></section>`;

  panel.innerHTML =
    `<div class="read-hero">
       <button class="panel-close" id="panel-close" aria-label="Close">✕</button>
       <div class="pt-badge">${escapeHtml(sheet)}</div>
       <h2>${hl(rec._title)}</h2>
       ${metaHtml}
     </div>
     <div class="read">${body}</div>`;
  panel.classList.add("open"); panel.setAttribute("aria-hidden","false");
  backdrop.classList.add("open");
  el("panel-close").addEventListener("click", closeRecordNav);
  wireCommon(panel);
  requestAnimationFrame(()=> revealIn(panel));
}
function closeRecord(){
  el("panel").classList.remove("open"); el("panel").setAttribute("aria-hidden","true");
  el("backdrop").classList.remove("open");
}
function closeRecordNav(){ location.hash = currentBaseHash || "#/"; }

/* =========================================================================
   Router
   ========================================================================= */
function router(){
  const hash = location.hash || "#/";
  const mRec = hash.match(/^#\/record\/(\d+)$/);
  if(mRec){
    // keep whatever base view is showing; ensure one exists
    if(!currentBaseHash || currentBaseHash==="#/record"){ currentBaseHash="#/"; renderLanding(); }
    else ensureBase(currentBaseHash);
    openRecord(parseInt(mRec[1],10));
    return;
  }
  closeRecord();
  currentBaseHash = hash;
  ensureBase(hash);
  orbSync();
  window.scrollTo(0,0);
}
let lastRenderedBase = null;
function ensureBase(hash){
  if(lastRenderedBase===hash) return;
  lastRenderedBase = hash;
  const mComp = hash.match(/^#\/company\/(.+)$/);
  const mSearch = hash.match(/^#\/search\/(.+)$/);
  const mBrowse = hash.match(/^#\/browse\/([^/]+)\/(.+)$/);
  if(mComp){ renderCompany(decodeURIComponent(mComp[1])); }
  else if(mSearch){ renderSearchPage(decodeURIComponent(mSearch[1])); }
  else if(hash==="#/dashboard"){ renderDashboard(); }
  else if(hash==="#/browse"){ renderBrowseHub(); }
  else if(mBrowse){ renderBrowseList(decodeURIComponent(mBrowse[1]), decodeURIComponent(mBrowse[2])); }
  else if(hash==="#/quotes"){ renderQuotes(); }
  else { renderLanding(); }
}

/* =========================================================================
   Boot
   ========================================================================= */
function wireSearch(){
  const q = el("q");
  q.addEventListener("input", ()=>{ clearTimeout(debounceT); debounceT=setTimeout(renderDropdown,120); });
  q.addEventListener("focus", ()=>{ if(q.value.trim()) renderDropdown(); });
  q.addEventListener("keydown", e=>{
    const dd=el("dropdown");
    if(e.key==="ArrowDown"){ e.preventDefault(); if(navItems.length){ activeIndex=Math.min(navItems.length-1,activeIndex+1); paintActive(); } }
    else if(e.key==="ArrowUp"){ e.preventDefault(); if(navItems.length){ activeIndex=Math.max(0,activeIndex-1); paintActive(); } }
    else if(e.key==="Enter"){
      e.preventDefault();
      if(activeIndex>=0) activate(activeIndex);
      else if(q.value.trim()) gotoSearch(q.value);
    }
    else if(e.key==="Escape"){ if(dd.classList.contains("open")){ closeDropdown(); } else { q.blur(); } }
  });
  // click outside closes dropdown
  document.addEventListener("click", e=>{
    if(!el("dropdown").contains(e.target) && e.target!==q && !el("dropdown").parentElement.contains(e.target))
      closeDropdown();
  });
  // global shortcuts
  document.addEventListener("keydown", e=>{
    if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==="k"){ e.preventDefault(); q.focus(); q.select(); }
    else if(e.key==="/" && document.activeElement!==q && !/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)){
      e.preventDefault(); q.focus();
    }
    else if(e.key==="Escape" && el("panel").classList.contains("open")){ closeRecordNav(); }
  });
  el("brand").addEventListener("click", ()=> location.hash="#/");
  el("backdrop").addEventListener("click", closeRecordNav);
}

fetch("data.json").then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
.then(data=>{
  RECORDS = data.records||[];
  GLOSSARY = data.glossary||[];
  buildIndex();
  wireSearch();
  initTheme();
  window.addEventListener("hashchange", router);
  router();
  initOrb(); orbSync();
  requestAnimationFrame(()=> revealIn(document.querySelector('.hwrap.search-row')));
})
.catch(err=>{
  el("app").innerHTML = `<div class="empty-view">Could not load <code>data.json</code>: ${escapeHtml(err.message)}.<br>Serve this folder over HTTP (e.g. <code>python3 -m http.server</code>), not via file://.</div>`;
});
